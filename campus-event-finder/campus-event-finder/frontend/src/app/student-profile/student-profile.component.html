<div class="profile-page" [style.background-image]="'url(' + backgroundImage + ')'">
  <app-navigation></app-navigation>

  <section class="profile-card" aria-label="Student profile card">
    <div class="avatar-wrap">
      <img
        [src]="profileImageUrl"
        alt="Student profile image"
        class="avatar"
        (error)="onAvatarError($event)"
      />
      <button
        type="button"
        class="avatar-edit"
        (click)="openAvatarPicker(avatarInput)"
        aria-label="Change profile photo"
      >
        <span aria-hidden="true">&#9998;</span>
      </button>
      <input
        #avatarInput
        type="file"
        accept="image/*"
        class="avatar-input"
        (change)="onAvatarSelected($event)"
      />
    </div>
    <h1>{{ currentUser?.fullName || 'Student' }}</h1>

    <div class="profile-details" *ngIf="currentUser">
      <p class="detail">{{ currentUser.email }}</p>
      <p class="detail">{{ currentUser.department }}</p>
    </div>

    <p class="avatar-message" *ngIf="avatarMessage">{{ avatarMessage }}</p>
  </section>
</div>
