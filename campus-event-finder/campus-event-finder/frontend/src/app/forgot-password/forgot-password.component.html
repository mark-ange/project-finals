<div class="forgot-page">
  <div class="forgot-card">
    <!-- Header -->
    <div class="card-header">
      <img src="assets/liceo-logo.png" alt="Liceo Logo" class="logo" />
      <h1 class="university-title">LICEO DE CAGAYAN<br />UNIVERSITY</h1>
    </div>

    <div class="divider"></div>

    <!-- Request Form -->
    <div class="card-body" *ngIf="phase === 'request'">
      <div class="icon-wrap">
        <span aria-hidden="true">🔒</span>
      </div>
      <h2 class="card-title">Forgot Password?</h2>
      <p class="card-hint">Enter your university email and we'll help you reset your access.</p>

      <form
        [formGroup]="requestForm"
        (ngSubmit)="onSubmitRequest()"
        class="forgot-form"
        id="forgot-form"
      >
        <input
          type="email"
          placeholder="you@liceo.edu.ph"
          formControlName="email"
          class="form-input"
          autocomplete="email"
          id="forgot-email"
        />

        <button type="submit" class="primary-btn" id="forgot-submit" [disabled]="requestForm.invalid">
          Send Reset Link
        </button>
        <button type="button" class="text-btn" (click)="backToLogin()" id="forgot-back-btn">
          ← Back to sign in
        </button>
      </form>
    </div>

    <!-- Done State -->
    <div class="card-body success-state" *ngIf="phase === 'done'">
      <div class="icon-wrap success">
        <span aria-hidden="true">✅</span>
      </div>
      <h2 class="card-title">Request Sent</h2>
      <p class="card-hint">{{ message }}</p>
      <button type="button" class="primary-btn" (click)="backToLogin()" id="forgot-done-back-btn">
        Back to Sign In
      </button>
    </div>
  </div>
</div>
