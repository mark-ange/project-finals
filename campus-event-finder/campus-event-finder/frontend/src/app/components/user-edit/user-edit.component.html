<section class="form-page">
  <div class="form-card">
    <h2>Edit User</h2>
    <p class="subtitle">Update the selected user record.</p>

    <div *ngIf="loading" class="status">Loading user details...</div>

    <form *ngIf="!loading" (ngSubmit)="save()" #userForm="ngForm">
      <label>
        Full Name
        <input name="name" type="text" [(ngModel)]="name" required />
      </label>

      <label>
        Email
        <input name="email" type="email" [(ngModel)]="email" required />
      </label>

      <div *ngIf="errorMessage" class="status error">{{ errorMessage }}</div>

      <div class="actions">
        <button class="btn primary" type="submit" [disabled]="saving || userForm.invalid">
          {{ saving ? 'Saving...' : 'Update User' }}
        </button>
        <a class="btn" routerLink="/users">Cancel</a>
      </div>
    </form>
  </div>
</section>
