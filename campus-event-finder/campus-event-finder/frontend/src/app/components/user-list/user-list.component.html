<section class="user-page">
  <header class="user-header">
    <div>
      <h2>Users</h2>
      <p class="subtitle">Manage users stored in the MySQL database.</p>
    </div>
    <a class="btn primary" routerLink="/users/new">Add User</a>
  </header>

  <div *ngIf="loading" class="status">Loading users...</div>
  <div *ngIf="errorMessage" class="status error">{{ errorMessage }}</div>
  <div *ngIf="resetMessage" class="status" [class.error]="resetMessageType === 'error'" [class.success]="resetMessageType === 'success'">
    {{ resetMessage }}
  </div>

  <table *ngIf="!loading && users.length" class="user-table">
    <thead>
      <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Email</th>
        <th class="actions">Actions</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let user of users; trackBy: trackByUserId">
        <td>{{ user.id }}</td>
        <td>{{ user.name }}</td>
        <td>{{ user.email }}</td>
        <td class="actions">
          <a class="btn" [routerLink]="['/users', user.id, 'edit']">Edit</a>
          <button
            *ngIf="authService.isMainAdmin()"
            class="btn secondary"
            type="button"
            (click)="sendResetLink(user)"
          >
            Send reset link
          </button>
          <ng-container *ngIf="pendingDeleteUserId !== user.id; else userDeleteConfirm">
            <button class="btn danger" type="button" (click)="requestDeleteUser(user)">Delete</button>
          </ng-container>
          <ng-template #userDeleteConfirm>
            <span class="delete-prompt">Delete {{ user.name }}?</span>
            <button class="btn danger" type="button" (click)="confirmDeleteUser(user)">Yes</button>
            <button class="btn" type="button" (click)="cancelDelete()">Cancel</button>
          </ng-template>
        </td>
      </tr>
    </tbody>
  </table>

  <p *ngIf="!loading && !users.length" class="status">No users yet. Add one to get started.</p>
</section>
